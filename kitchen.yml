---
driver:
  name: dokken
  privileged: true
  chef_version: current

transport:
  name: dokken

provisioner:
  name: dokken
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-9
    driver:
      image: dokken/almalinux-9
      pid_one_command: /usr/lib/systemd/systemd

  - name: amazonlinux-2023
    driver:
      image: dokken/amazonlinux-2023
      pid_one_command: /usr/lib/systemd/systemd

  - name: archlinux
    driver:
      image: archlinux
      pid_one_command: /usr/lib/systemd/systemd

  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd

  - name: debian-13
    driver:
      image: dokken/debian-13
      pid_one_command: /bin/systemd

  - name: gentoo
    driver:
      image: gentoo/stage3-amd64
      pid_one_command: /sbin/init
      intermediate_instructions:
        - RUN echo 'GENTOO_MIRRORS=http://gentoo.mirrors.tera-byte.com/' >> /etc/portage/make.conf
        - RUN mkdir -p /etc/portage/repos.conf
        - RUN cp /usr/share/portage/config/repos.conf /etc/portage/repos.conf/gentoo.conf
        - RUN sed -i -e 's/sync-uri =.*/sync-uri = rsync:\/\/rsync.us.gentoo.org\/gentoo-portage/' /etc/portage/repos.conf/gentoo.conf
        - RUN emerge --sync || true

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  service: &service_run_list
    - recipe[test::service]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  service: &service_verifier
    inspec_tests:
      - path: test/integration/service

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
  - name: service
    run_list: *service_run_list
    verifier: *service_verifier

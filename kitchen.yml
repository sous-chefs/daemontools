---
driver:
  name: dokken
  privileged: true
  chef_version: current

transport:
  name: dokken

provisioner:
  name: dokken
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: amazonlinux-2023
    driver:
      image: dokken/amazonlinux-2023
      pid_one_command: /usr/lib/systemd/systemd

  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  service: &service_run_list
    - recipe[test::service]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  service: &service_verifier
    inspec_tests:
      - path: test/integration/service

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
  - name: service
    run_list: *service_run_list
    verifier: *service_verifier
